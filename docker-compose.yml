version: '3.8'

services:
  web:
    build: .
    container_name: artisanai-web
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    volumes:
      # Mount static files if you need live updates during development
      # - ./static:/app/static
      # - ./templates:/app/templates
    restart: unless-stopped
    networks:
      - artisanai-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  artisanai-network:
    driver: bridge
